services:
  coturn:
    image: coturn/coturn:4.6.3
    container_name: web3-chat-turn-stun
    restart: unless-stopped
    command: ["-c", "/etc/coturn/turnserver.conf"]
    ports:
      - "3478:3478/tcp"
      - "3478:3478/udp"
      - "49160-49200:49160-49200/udp"
    volumes:
      - ./turnserver.conf:/etc/coturn/turnserver.conf:ro
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    tmpfs:
      - /var/tmp

# If relay fails under Docker bridge, use one of:
# 1) Configure external-ip/relay-ip in turnserver.conf.
# 2) Or switch to host networking (Linux):
#    network_mode: host
