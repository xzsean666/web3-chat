services:
  coturn:
    image: coturn/coturn:4.6.3
    container_name: web3-chat-turn-stun
    restart: unless-stopped
    network_mode: host
    command: ["-c", "/etc/coturn/turnserver.conf"]
    volumes:
      - ./turnserver.conf:/etc/coturn/turnserver.conf:ro
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    tmpfs:
      - /var/tmp

# Linux server default:
# - host networking avoids Docker bridge/NAT issues for TURN relay.
# - open 3478/tcp, 3478/udp, 49160-49200/udp in your firewall/security group.
